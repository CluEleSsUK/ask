name: 🚀 Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    name: 📦 Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ask
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ask
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ask
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 🔨 Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📁 Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ask-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ask-${{ matrix.target }}
          path: ask-${{ matrix.target }}.tar.gz

  release:
    name: 🚀 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
